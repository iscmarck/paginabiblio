<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Buscador Bibliográfico</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}
h1 {
    text-align: center;
}
#buscador {
    width: 100%;
    max-width: 500px;
    margin: 20px auto;
    display: block;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* 🔥 Layout */
.layout {
    display: flex;
    gap: 20px;
    max-width: 1100px;
    margin: auto;
}

/* 🔤 Abecedario */
.abecedario {
    text-align: center;
    margin-bottom: 20px;
}
.letra {
    display: inline-block;
    margin: 3px;
    padding: 6px 10px;
    background: #ddd;
    border-radius: 5px;
    cursor: pointer;
}
.activa {
    background: #007bff;
    color: white;
}

/* 📚 Lista principal */
.contenedor {
    flex: 3;
}
.item {
    display: flex;
    gap: 15px;
    background: white;
    margin: 10px 0;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    align-items: center;
}
.item img {
    width: 100px;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
}
.contenido {
    flex: 1;
}
.tipo {
    font-size: 12px;
    color: white;
    padding: 3px 8px;
    border-radius: 5px;
}
.libro { background: #007bff; }
.revista { background: #28a745; }
.articulo { background: #ffc107; color: black; }
.folleto { background: #dc3545; }

/* 🆕 Sidebar */
.sidebar {
    flex: 1;
}
.nuevos {
    background: white;
    padding: 15px;
    border-radius: 10px;
    border: 2px solid #007bff;
}
.nuevos h3 {
    margin-top: 0;
    text-align: center;
}
.nuevo-item {
    font-size: 14px;
    margin: 8px 0;
    border-bottom: 1px solid #eee;
    padding-bottom: 5px;
}
.numero {
    font-weight: bold;
    color: #007bff;
}

/* 🚨 SOLO AGREGADO */
.alerta {
    position: fixed;
    left: 20px;
    width: 250px;
    color: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    display: none;
    z-index: 1000;
}
.alerta1 { top: 20%; background: #545657; }
.alerta2 { top: 40%; background: #545657; }
.alerta3 { top: 60%; background: #545657; }
.alerta4 { top: 80%; background: #545657; }

.cerrar {
    background: white;
    color: #000;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    float: right;
}
</style>
</head>

<body>

<h1>Buscador Bibliográfico</h1>

<input type="text" id="buscador" placeholder="Buscar...">

<div class="abecedario" id="abecedario"></div>

<div class="layout">

    <!-- 📚 IZQUIERDA -->
    <div class="contenedor" id="lista"></div>

    <!-- 🆕 DERECHA -->
    <div class="sidebar">
        <div class="nuevos">
            <h3>Nuevos títulos</h3>
            <div id="nuevosLista"></div>
        </div>
    </div>

</div>

<!-- 🚨 SOLO AGREGADO -->
<div class="alerta alerta1" id="alerta1">
    <button class="cerrar" onclick="cerrarAlerta('alerta1')">X</button>
    <h4>📢 Aviso 1</h4>
    <p>Nuevo material disponible.</p>
</div>

<div class="alerta alerta2" id="alerta2">
    <button class="cerrar" onclick="cerrarAlerta('alerta2')">X</button>
    <h4>📚 Aviso 2</h4>
    <p>Revisa nuestras revistas digitales.</p>
</div>

<div class="alerta alerta3" id="alerta3">
    <button class="cerrar" onclick="cerrarAlerta('alerta3')">X</button>
    <h4>⚠️ Aviso 3</h4>
    <p>Mantenimiento este fin de semana.</p>
</div>

<div class="alerta alerta4" id="alerta4">
    <button class="cerrar" onclick="cerrarAlerta('alerta4')">X</button>
    <h4> Contactanos </h4>
    <p>Si requieres de algun materia necesito que me mandes un correo xxxxxxxk@hotmail.com.</p>
</div>

<script>

const datos = [
    {tipo: "libro", titulo: "Historia de Chiapas", autor: "Juan Pérez", imagen: "https://historico.conaliteg.gob.mx/c/H1993P3HI161/000.jpg", descripcion: "Esto sera una descripcion del articulo o libro o revista o folleto Un recorrido histórico por el estado de Chiapas."},
    {tipo: "revista", titulo: "Cultura y Sociedad", autor: "María López", imagen: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEndY1fBwami2CuFtKcRZyz8T1uTxDVD7K3w&s"},
    {tipo: "articulo", titulo: "Turismo en San Cristóbal", autor: "Carlos Ruiz", imagen: "https://0.academia-photos.com/attachment_thumbnails/125750250/mini_magick20251216-1-tdzecp.png?1765847358", descripcion: "Análisis del turismo en San Cristóbal de las Casas."},
    {tipo: "folleto", titulo: "Guía turística Chiapas", autor: "Gobierno de México", imagen: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTz-Bv4kZczLDUd4spB7zvu2EdkO2AZuSEbcw&s"},
    {tipo: "libro", titulo: "Ecosistemas de Chiapas", autor: "Ana Gómez", imagen: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRTVoGY2XRDYkCFBEwh-1e5bPYmUwwDMZG8Qw&s", descripcion: "Descripción de los ecosistemas presentes en Chiapas."},
    {tipo: "articulo", titulo: "Economía regional", autor: "Luis Hernández", imagen: "https://www.comecso.com/wp-content/uploads/2024/05/portada-133-810x1121.jpg"},
    {tipo: "libro", titulo: "Biodiversidad en Chiapas", autor: "Laura Méndez", imagen: "https://i1.rgstatic.net/publication/264544109_La_Biodiversidad_en_Chiapas_Estudio_de_Estado_Volumen_1/links/53e3e2610cf2fb74870e23e9/largepreview.png", descripcion: "Estudio sobre la biodiversidad del estado."},
    {tipo: "revista", titulo: "Investigación Ambiental", autor: "UNAM", imagen: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWJaWlTSv4lPXtsZFb00OMiCewZ2w_IeBjfw&s"},
    {tipo: "articulo", titulo: "Cambio climático en México", autor: "Pedro Torres", imagen: "https://i1.rgstatic.net/publication/337972712_El_cambio_climatico/links/5df891ba299bf10bc361366f/largepreview.png"},
    {tipo: "libro", titulo: "Zoología de México", autor: "Dr. Rivera", imagen: "https://m.media-amazon.com/images/I/51A4SVe1jXL._AC_UF1000,1000_QL80_.jpg"}
];

const lista = document.getElementById("lista");
const buscador = document.getElementById("buscador");
const abecedarioDiv = document.getElementById("abecedario");
const nuevosLista = document.getElementById("nuevosLista");

let letraSeleccionada = "TODOS";

// 🔤 Abecedario
"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letra => {
    const span = document.createElement("span");
    span.textContent = letra;
    span.classList.add("letra");
    span.onclick = () => {
        letraSeleccionada = letra;
        actualizarActiva(span);
        mostrarDatos(buscador.value);
    };
    abecedarioDiv.appendChild(span);
});

// TODOS
const todosBtn = document.createElement("span");
todosBtn.textContent = "TODOS";
todosBtn.classList.add("letra", "activa");
todosBtn.onclick = () => {
    letraSeleccionada = "TODOS";
    actualizarActiva(todosBtn);
    mostrarDatos(buscador.value);
};
abecedarioDiv.appendChild(todosBtn);

function actualizarActiva(el) {
    document.querySelectorAll(".letra").forEach(l => l.classList.remove("activa"));
    el.classList.add("activa");
}

// 🚨 SOLO AGREGADO
setTimeout(() => document.getElementById("alerta1").style.display = "block", 500);
setTimeout(() => document.getElementById("alerta2").style.display = "block", 1000);
setTimeout(() => document.getElementById("alerta3").style.display = "block", 1500);
setTimeout(() => document.getElementById("alerta4").style.display = "block", 2000);

function cerrarAlerta(id) {
    document.getElementById(id).style.display = "none";
}

// 🔤 Normalizar
function normalizar(t) {
    return t.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[.,]/g, "");
}

// 🔤 Ordenar
function ordenarDatos(arr) {
    return arr.sort((a, b) =>
        normalizar(a.titulo).localeCompare(normalizar(b.titulo))
    );
}

// 📚 Mostrar lista principal
function mostrarDatos(filtro="") {
    lista.innerHTML = "";
    const f = normalizar(filtro);

    let resultado = datos.filter(item => {
        const coincide = normalizar(item.titulo).includes(f) ||
                         normalizar(item.autor).includes(f) ||
                         normalizar(item.tipo).includes(f);

        const coincideLetra = letraSeleccionada === "TODOS" ||
                              normalizar(item.titulo).startsWith(normalizar(letraSeleccionada));

        return coincide && coincideLetra;
    });

    resultado = ordenarDatos(resultado);

    const limite = (letraSeleccionada === "TODOS") ? 10 : 6;

    resultado.slice(0, limite).forEach(item => {
        const div = document.createElement("div");
        div.classList.add("item");

        div.innerHTML = `
            <img src="${item.imagen}">
            <div class="contenido">
                <span class="tipo ${item.tipo}">${item.tipo}</span>
                <h3>${item.titulo}</h3>
                <p>${item.autor}</p>
                ${item.descripcion ? `<p>${item.descripcion}</p>` : ""}
            </div>
        `;

        lista.appendChild(div);
    });
}

// 🆕 Mostrar nuevos
function mostrarNuevos() {
    nuevosLista.innerHTML = "";

    const nuevos = [...datos].reverse().slice(0, 10);

    nuevos.forEach((item, index) => {
        const div = document.createElement("div");
        div.classList.add("nuevo-item");

        div.innerHTML = `
            <span class="numero">${index + 1}.</span> ${item.titulo}
        `;

        nuevosLista.appendChild(div);
    });
}

// eventos
buscador.onkeyup = e => mostrarDatos(e.target.value);

// inicial
mostrarDatos();
mostrarNuevos();

</script>

</body>
</html>
